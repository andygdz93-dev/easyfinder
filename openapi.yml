openapi: 3.0.3
info:
  title: EasyFinder API
  version: 1.1.0
  description: >
    EasyFinder API contract aligned to currently implemented routes in apps/api.
    Updated to include IronPlanet scraping ingestion and correct NDA/Auth behaviors.

servers:
  - url: https://easyfinder.fly.dev
    description: Production
  - url: http://localhost:8080
    description: Local

tags:
  - name: System
  - name: Auth
  - name: Listings
  - name: Demo Listings
  - name: Scoring
  - name: Watchlist
  - name: Inquiries
  - name: Offers
  - name: Seller
  - name: Admin
  - name: Me
  - name: NDA
  - name: Billing
  - name: Scrapers

paths:
  /health:
    get:
      tags: [System]
      summary: Root health check
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                required: [ok, demoMode, billingEnabled]
                properties:
                  ok: { type: boolean }
                  demoMode: { type: boolean }
                  billingEnabled: { type: boolean }

  /ready:
    get:
      tags: [System]
      summary: Readiness probe
      responses:
        "200":
          description: Readiness state
          content:
            application/json:
              schema:
                type: object
                required: [ready]
                properties:
                  ready: { type: boolean }

  /api/cors-test:
    get:
      tags: [System]
      summary: CORS test endpoint
      responses:
        "200":
          description: CORS test response
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /api/health:
    get:
      tags: [System]
      summary: API health check
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/demo/listings:
    get:
      tags: [Demo Listings]
      summary: Get ranked demo listings
      responses:
        "200":
          description: Demo listing array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"

  /api/demo/listings/{id}:
    get:
      tags: [Demo Listings]
      summary: Get demo listing by id
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200":
          description: Demo listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/listings:
    get:
      tags: [Listings]
      summary: Get ranked live listings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Live listing array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "402": { $ref: "#/components/responses/PaymentRequiredError" }
        "403": { $ref: "#/components/responses/NdaRequiredError" }
        "503": { $ref: "#/components/responses/DemoModeActiveError" }
    post:
      tags: [Listings]
      summary: Create listing (not implemented)
      security:
        - bearerAuth: []
      responses:
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403":
          description: NDA required or writes disabled in demo mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "501":
          description: Not implemented
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    put:
      tags: [Listings]
      summary: Update listing (not implemented)
      security:
        - bearerAuth: []
      responses:
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403":
          description: NDA required or writes disabled in demo mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "501":
          description: Not implemented
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    delete:
      tags: [Listings]
      summary: Delete listing (not implemented)
      security:
        - bearerAuth: []
      responses:
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403":
          description: NDA required or writes disabled in demo mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "501":
          description: Not implemented
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/listings/{id}:
    get:
      tags: [Listings]
      summary: Get live listing by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "200":
          description: Live listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "402": { $ref: "#/components/responses/PaymentRequiredError" }
        "403": { $ref: "#/components/responses/NdaRequiredError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "503": { $ref: "#/components/responses/DemoModeActiveError" }

  /api/scrape/ironplanet:
    get:
      tags: [Scrapers]
      summary: Scrape IronPlanet search results and upsert into live listings
      description: >
        Scrapes an IronPlanet search results page (url query param), extracts listings,
        and upserts them into MongoDB. Writes are blocked when DEMO_MODE is enabled.
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
          description: URL-encoded IronPlanet search URL to scrape.
      responses:
        "200":
          description: Scrape + upsert summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeIronPlanetResponse"
        "400":
          description: Invalid request (missing/invalid url)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "403":
          description: Writes disabled in demo mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "500":
          description: Scrape failure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/scoring-configs:
    get:
      tags: [Scoring]
      summary: Get active scoring config
      responses:
        "200":
          description: Current scoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfigEnvelope"
    post:
      tags: [Scoring]
      summary: Replace scoring config
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoringConfigInput"
      responses:
        "200":
          description: Updated scoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfigEnvelope"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "402": { $ref: "#/components/responses/PaymentRequiredError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/watchlist:
    get:
      tags: [Watchlist]
      summary: Get current user's watchlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Watchlist response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "402": { $ref: "#/components/responses/PaymentRequiredError" }
        "403": { $ref: "#/components/responses/NdaRequiredError" }

  /api/watchlist/{listingId}:
    post:
      tags: [Watchlist]
      summary: Add listing to watchlist
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ListingIdAsWatchlist"
      responses:
        "200":
          description: Watchlist item response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItemResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "402":
          description: Subscription or plan limit required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403": { $ref: "#/components/responses/NdaRequiredError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    delete:
      tags: [Watchlist]
      summary: Remove listing from watchlist
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ListingIdAsWatchlist"
      responses:
        "200":
          description: Watchlist remove response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemovedResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "402": { $ref: "#/components/responses/PaymentRequiredError" }
        "403": { $ref: "#/components/responses/NdaRequiredError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/offers:
    post:
      tags: [Offers]
      summary: Submit offer (not implemented)
      security:
        - bearerAuth: []
      responses:
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403":
          description: NDA required or writes disabled in demo mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/inquiries:
    post:
      tags: [Inquiries]
      summary: Create inquiry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryRequest"
      responses:
        "200":
          description: Inquiry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409":
          description: Existing open inquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Email exists or invalid reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Always returns success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/admin/overview:
    get:
      tags: [Admin]
      summary: Admin platform overview
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Overview payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverviewResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/admin/listings:
    get:
      tags: [Admin]
      summary: List and filter listings for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, paused, removed, pending_review] }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Listings page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminListingsResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/admin/listings/{id}:
    patch:
      tags: [Admin]
      summary: Moderate listing status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ListingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, paused, removed]
                reason: { type: string }
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      listing: { $ref: "#/components/schemas/Listing" }
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    delete:
      tags: [Admin]
      summary: Hard delete listing
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ListingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation, reason]
              properties:
                confirmation:
                  type: string
                  description: Exact phrase "DELETE <listingId>"
                reason: { type: string }
      responses:
        "200":
          description: Listing hard deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemovedResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/admin/inquiries:
    get:
      tags: [Admin]
      summary: List inquiries for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: status
          schema: { type: string, enum: [open, closed, spam] }
      responses:
        "200":
          description: Inquiry page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInquiriesResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/admin/inquiries/{id}:
    patch:
      tags: [Admin]
      summary: Update inquiry status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, closed, spam] }
                reason: { type: string }
      responses:
        "200":
          description: Inquiry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      inquiry: { $ref: "#/components/schemas/Inquiry" }
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/admin/scoring-config:
    get:
      tags: [Admin]
      summary: Get active scoring config
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfigEnvelope"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
    post:
      tags: [Admin]
      summary: Replace scoring config
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoringConfigInput"
      responses:
        "200":
          description: Config replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoringConfigEnvelope"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/admin/audit:
    get:
      tags: [Admin]
      summary: List and filter admin audit logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: targetType
          schema: { type: string, enum: [listing, inquiry, scoringConfig, ingestion] }
        - in: query
          name: targetId
          schema: { type: string }
        - in: query
          name: actorEmail
          schema: { type: string, format: email }
        - in: query
          name: dateFrom
          schema: { type: string, format: date-time }
        - in: query
          name: dateTo
          schema: { type: string, format: date-time }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Audit log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuditResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/admin/scrape/ironplanet:
    post:
      tags: [Admin]
      summary: Trigger IronPlanet scrape
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string }
      responses:
        "200":
          description: Scrape summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeIronPlanetResponse"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }


  /api/seller/inquiries:
    get:
      tags: [Seller]
      summary: List seller inquiries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Inquiries list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Inquiry"
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/seller/insights:
    get:
      tags: [Seller]
      summary: Seller insights summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seller insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      atRiskListings:
                        type: array
                        items: { $ref: "#/components/schemas/Listing" }
                      priceBands:
                        type: array
                        items:
                          type: object
                          properties:
                            listingId: { type: string }
                            range:
                              type: object
                              properties:
                                min: { type: number }
                                max: { type: number }
                            state: { type: string }
                      qualityChecklistSummary:
                        type: object
                        properties:
                          total: { type: integer }
                          missingImages: { type: integer }
                          missingDescriptions: { type: integer }
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/me:
    get:
      tags: [Me]
      summary: Get current profile including billing
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMeResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/NdaRequiredError" }

  /api/me/role:
    patch:
      tags: [Me]
      summary: Update account role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [buyer, seller, enterprise]
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/nda/status:
    get:
      tags: [NDA]
      summary: Get NDA acceptance state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Acceptance status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accepted: { type: boolean }
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }

  /api/nda/accept:
    post:
      tags: [NDA]
      summary: Accept NDA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accepted]
              properties:
                accepted:
                  type: boolean
                  enum: [true]
      responses:
        "200":
          description: NDA accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accepted: { type: boolean }
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/billing/activate-pro-promo:
    post:
      tags: [Billing]
      summary: Activate seller Pro launch promo
      security:
        - bearerAuth: []
      description: Route is registered only when BILLING_ENABLED is true.
      responses:
        "200":
          description: Promo activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success: { type: boolean }
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403":
          description: Forbidden (non-seller role or promo inactive)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code: { type: string, enum: [FORBIDDEN, promo_inactive] }
                      message: { type: string }
                  requestId: { type: string }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/billing/create-checkout-session:
    post:
      tags: [Billing]
      summary: Create Stripe checkout session
      security:
        - bearerAuth: []
      description: Route is registered only when BILLING_ENABLED is true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [pro, enterprise]
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
                        nullable: true
                  requestId: { type: string }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/billing/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook receiver
      description: Route is registered only when BILLING_ENABLED is true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Event acknowledged
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Missing signature, raw body, or invalid signature
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
        "500":
          description: Event recording or processing failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ListingId:
      in: path
      name: id
      required: true
      schema: { type: string }
    ListingIdAsWatchlist:
      in: path
      name: listingId
      required: true
      schema: { type: string }

  responses:
    UnauthorizedError:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ForbiddenError:
      description: Forbidden.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    PaymentRequiredError:
      description: Active subscription required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NdaRequiredError:
      description: NDA must be accepted.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    DemoModeActiveError:
      description: Live listings unavailable in demo mode.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
        requestId: { type: string }

    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            ok: { type: boolean }
            demoMode: { type: boolean }
            billingEnabled: { type: boolean }
        requestId: { type: string }

    Listing:
      type: object
      required: [id, title, category, state, source, operable]
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        state: { type: string }
        price: { type: number, nullable: true }
        hours: { type: number, nullable: true }
        year: { type: integer, nullable: true }
        condition: { type: number, nullable: true }
        sellerType: { type: string, enum: [dealer, auction, private, unknown], nullable: true }
        shippingAvailable: { type: boolean, nullable: true }
        availability: { type: string, enum: [in_stock, scheduled_auction, unknown], nullable: true }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        listingUpdatedAt: { type: string, format: date-time, nullable: true }
        photoCount: { type: integer, nullable: true }
        hasInspectionReport: { type: boolean, nullable: true }
        hasServiceHistory: { type: boolean, nullable: true }
        verifiedSeller: { type: boolean, nullable: true }
        city: { type: string, nullable: true }
        country: { type: string, nullable: true }
        operable: { type: boolean }
        source: { type: string }
        images:
          type: array
          items: { type: string }
        imageUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        totalScore: { type: number }
        scoreV2:
          $ref: "#/components/schemas/ScorePillars"
        confidenceScore: { type: number }
        reasons:
          type: array
          items: { $ref: "#/components/schemas/ScoreReason" }
        flags:
          type: array
          items: { type: string }
        bestOptionEligible: { type: boolean }
        score:
          $ref: "#/components/schemas/ScoreBreakdown"

    ScorePillars:
      type: object
      properties:
        deal: { type: number }
        usage: { type: number }
        risk: { type: number }
        speed: { type: number }

    ScoreReason:
      type: object
      properties:
        kind: { type: string, enum: [deal, usage, risk, speed] }
        message: { type: string }

    ScoreBreakdown:
      type: object
      properties:
        total: { type: number }
        breakdown:
          $ref: "#/components/schemas/ScorePillars"
        scoreV2:
          $ref: "#/components/schemas/ScorePillars"
        reasons:
          type: array
          items: { $ref: "#/components/schemas/ScoreReason" }
        flags:
          type: array
          items: { type: string }
        confidence: { type: number }
        confidenceScore: { type: number }
        bestOptionEligible: { type: boolean }
        disqualified: { type: boolean }

    ListingsResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Listing" }
        requestId: { type: string }

    ListingResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Listing" }
        requestId: { type: string }

    WatchlistResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/WatchlistItem"
        requestId: { type: string }

    WatchlistItemResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            item:
              $ref: "#/components/schemas/WatchlistItem"
        requestId: { type: string }

    WatchlistItem:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        listingId: { type: string }
        createdAt: { type: string, format: date-time }

    RemovedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            removed: { type: boolean }
        requestId: { type: string }

    ScoringConfigInput:
      type: object
      required:
        [name, weights, preferredStates, minHours, maxHours, minPrice, maxPrice, minYear, maxYear, minCondition, maxCondition]
      properties:
        name: { type: string }
        weights:
          type: object
          properties:
            price: { type: number }
            hours: { type: number }
            year: { type: number }
            location: { type: number }
            condition: { type: number }
            completeness: { type: number }
        preferredStates:
          type: array
          items: { type: string }
        minPrice: { type: number }
        maxPrice: { type: number }
        minHours: { type: number }
        maxHours: { type: number }
        minYear: { type: number }
        maxYear: { type: number }
        minCondition: { type: number }
        maxCondition: { type: number }

    ScoringConfigEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            config:
              allOf:
                - $ref: "#/components/schemas/ScoringConfigInput"
                - type: object
                  properties:
                    id: { type: string }
                    active: { type: boolean }
        requestId: { type: string }

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token: { type: string }
            user: { $ref: "#/components/schemas/User" }
        requestId: { type: string }

    UserResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/User" }
        requestId: { type: string }

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          nullable: true
          enum: [demo, buyer, seller, admin, enterprise]

    SuccessResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            success: { type: boolean }
        requestId: { type: string }

    Inquiry:
      type: object
      properties:
        id: { type: string }
        listingId: { type: string }
        buyerName: { type: string }
        buyerEmail: { type: string, format: email }
        message: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    CreateInquiryRequest:
      type: object
      required: [listingId, message]
      properties:
        listingId: { type: string }
        message: { type: string, minLength: 1, maxLength: 2000 }

    InquiryResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Inquiry"
        requestId: { type: string }

    UserMeResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/User"
            - type: object
              properties:
                ndaAccepted: { type: boolean }
                ndaAcceptedAt: { type: string, format: date-time, nullable: true }
                ndaVersion: { type: string, nullable: true }
                billing:
                  type: object
                  properties:
                    stripe_customer_id: { type: string, nullable: true }
                    stripe_subscription_id: { type: string, nullable: true }
                    plan: { type: string, enum: [free, pro, enterprise] }
                    status: { type: string, enum: [active, past_due, canceled, incomplete] }
                    current_period_end: { type: string, format: date-time }
                    promoActive: { type: boolean }
                    promoEndsAt: { type: string, format: date-time, nullable: true }
                    entitlements:
                      type: object
                      properties:
                        maxActiveListings: { type: integer, nullable: true }
                        csvUpload: { type: boolean }
                        marketplaceIntegrations: { type: boolean }

    AdminOverviewResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            listings:
              type: object
              properties:
                active: { type: integer }
                paused: { type: integer }
                removed: { type: integer }
                pending_review: { type: integer }
            bySource:
              type: object
              additionalProperties: { type: integer }
            inquiries:
              type: object
              properties:
                total: { type: integer }
                open: { type: integer }
                closed: { type: integer }
            lastIngestion:
              type: object
              additionalProperties:
                type: string
                nullable: true
            demoMode: { type: boolean }
            billingEnabled: { type: boolean }
        requestId: { type: string }

    AdminListingsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Listing" }
            total: { type: integer }
            page: { type: integer }
            pageSize: { type: integer }
        requestId: { type: string }

    AdminInquiriesResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Inquiry" }
            total: { type: integer }
            page: { type: integer }
            pageSize: { type: integer }
        requestId: { type: string }

    AdminAuditLog:
      type: object
      required: [id, actorUserId, actorEmail, action, targetType, targetId, requestId, createdAt]
      properties:
        id: { type: string }
        actorUserId: { type: string }
        actorEmail: { type: string, format: email }
        action: { type: string }
        targetType: { type: string, enum: [listing, inquiry, scoringConfig, ingestion] }
        targetId: { type: string }
        reason: { type: string }
        before:
          type: object
          nullable: true
          additionalProperties: true
        after:
          type: object
          nullable: true
          additionalProperties: true
        requestId: { type: string }
        createdAt: { type: string, format: date-time }

    AdminAuditResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/AdminAuditLog" }
            total: { type: integer }
            page: { type: integer }
            pageSize: { type: integer }
        requestId: { type: string }

    ScrapeIronPlanetResponse:
      type: object
      properties:
        data:
          type: object
          required: [scraped, upserted, modified, matched]
          properties:
            scraped: { type: integer }
            upserted: { type: integer }
            modified: { type: integer }
            matched: { type: integer }
            sampleListings:
              type: array
              items:
                type: object
                additionalProperties: true
        requestId: { type: string }
