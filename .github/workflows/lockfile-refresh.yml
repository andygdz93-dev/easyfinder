name: Refresh pnpm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.6.0 --activate
          pnpm -v

      - name: Log branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: echo "Branch: $BRANCH"

      - name: Install (update lockfile)
        run: pnpm install --no-frozen-lockfile

      - name: Verify frozen install
        run: pnpm install --frozen-lockfile

      - name: Detect lockfile change
        id: lock
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push lockfile
        if: steps.lock.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh pnpm lockfile"
          git push
