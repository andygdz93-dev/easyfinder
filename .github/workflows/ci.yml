name: CI

on:
  push:
    branches: [app]
  pull_request:

jobs:
  build-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed env/build artifacts
        shell: bash
        run: |
          forbidden_files=()

          while IFS= read -r -d '' file; do
            if [[ "${file##*/}" == ".env.example" ]]; then
              continue
            fi

            if [[ "$file" =~ (^|/)\.env($|\.) ]] || [[ "$file" =~ (^|/)node_modules/ ]] || [[ "$file" =~ (^|/)dist/ ]] || [[ "$file" =~ (^|/)\.turbo/ ]]; then
              forbidden_files+=("$file")
            fi
          done < <(git ls-files -z)

          if (( ${#forbidden_files[@]} > 0 )); then
            echo "Found forbidden tracked files:"
            printf ' - %s\n' "${forbidden_files[@]}"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Lint
        run: pnpm -w lint

      - name: Test
        run: pnpm -w test

      - name: Build
        run: pnpm -w build
