name: CI

on:
  push:
    branches: [app, main]
  pull_request:

jobs:
  build-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed env/build artifacts
        shell: bash
        run: |
          forbidden_files=()

          while IFS= read -r -d '' file; do
            if [[ "${file##*/}" == ".env.example" ]]; then
              continue
            fi

            if [[ "$file" =~ (^|/)\.env($|\.) ]] || [[ "$file" =~ (^|/)node_modules/ ]] || [[ "$file" =~ (^|/)dist/ ]] || [[ "$file" =~ (^|/)\.turbo/ ]]; then
              forbidden_files+=("$file")
            fi
          done < <(git ls-files -z)

          if (( ${#forbidden_files[@]} > 0 )); then
            echo "Found forbidden tracked files:"
            printf ' - %s\n' "${forbidden_files[@]}"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenAPI
        run: pnpm -w openapi:validate

      - name: Generate OpenAPI types
        run: pnpm -w openapi:types

      - name: Verify OpenAPI types are up to date
        run: git diff --exit-code -- apps/web/src/generated/openapi.ts

      - name: Ensure context file exists
        shell: bash
        run: test -f ./.easyfinder-context.md

      - name: Lint
        run: pnpm -w lint

      - name: Test
        run: pnpm -w test

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Build
        run: pnpm -w build

  deploy:
    name: Deploy to Fly.io
    needs: build-typecheck
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
