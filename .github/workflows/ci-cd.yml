name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # weekly security reminder

jobs:
  backend:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt
          pip install flake8 pytest pytest-asyncio

      - name: Lint backend
        run: |
          flake8 app/backend --max-line-length=120

      - name: Run backend tests
        run: |
          pytest app/backend/tests --asyncio-mode=auto --maxfail=1 --disable-warnings


  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd app/frontend
          npm ci || npm install

      - name: Build frontend
        run: |
          cd app/frontend
          npm run build


  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Fly CLI
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Deploy backend to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly deploy --remote-only


  hardening:
    name: Weekly Security Checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Security reminders
        run: |
          echo "Weekly Security Checklist:"
          echo "1. Review dependency updates"
          echo "2. Rotate secrets if needed"
          echo "3. Check auth & rate limits"
          echo "4. Review logs for anomalies"
          echo "5. Verify backups"
