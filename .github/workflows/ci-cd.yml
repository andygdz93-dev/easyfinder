name: CI/CD Pipeline + Security + Metrics

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0" # weekly scan & report

jobs:
  backend:
    name: Backend Lint, Test & Security
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: --health-cmd "mongo --eval 'db.adminCommand(\"ping\")'" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Code
        run: |
          pip install flake8
          flake8 app/ --max-line-length 120

      - name: Run Tests
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ --maxfail=1 --disable-warnings -q

      - name: Security Check
        run: |
          pip install safety
          safety check --full-report

      - name: Generate Metrics Placeholder
        run: |
          echo "Collect metrics for Prometheus/Grafana integration" > metrics_placeholder.txt

  frontend:
    name: Frontend Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install

      - name: Lint Frontend
        run: yarn lint || true

      - name: Run Frontend Tests
        run: yarn test --ci --coverage

      - name: Build Frontend
        run: yarn build

      - name: Security Scan
        run: |
          npm audit --json > npm_audit_report.json

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v3

      - name: Install Fly CLI
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"

      - name: Deploy to Fly.io
        run: fly deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  hardening:
    name: 30-Day Security Hardening Checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v3

      - name: Reminder: Security Hardening Tasks
        run: |
          echo "1. Update all dependencies and pin versions"
          echo "2. Enable HTTPS and secure headers"
          echo "3. Add rate limiting / brute-force protection"
          echo "4. Add audit logging for critical endpoints"
          echo "5. Scan Docker images for vulnerabilities"
          echo "6. Validate environment variables are secrets-only"
          echo "7. Enable monitoring & alerts for anomalies"
          echo "8. Run penetration tests"
